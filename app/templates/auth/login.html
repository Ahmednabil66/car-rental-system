{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="fw-bold mb-3">Login</h2>
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Username or Email</label>
                            <input name="identifier" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button class="btn btn-primary w-100">Login</button>
                    </form>
                    <p class="text-muted mt-3 mb-0">No account? <a href="{{ url_for('auth.register') }}">Register now</a>.</p>
                    <hr>
                    <p class="small text-muted mb-0">Demo admin: <strong>admin</strong> / <strong>admin123</strong></p>
                    <p class="small text-muted mb-0">Demo customer: <strong>customer1</strong> / <strong>customer123</strong></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
