{% extends "base.html" %}
{% block title %}Payment{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h1 class="fw-bold">Simulated Payment</h1>
                    <p class="text-muted">No real payment gateway is used. This page stores a payment record only.</p>
                    <div class="quote-box mb-4">
                        <div class="d-flex justify-content-between"><span>Rental</span><strong>#{{ rental.id }} - {{ rental.car.title }}</strong></div>
                        <div class="d-flex justify-content-between"><span>Total</span><strong>{{ rental.total_amount|money }}</strong></div>
                    </div>
                    <form method="post" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Payment Method</label>
                            <select name="method" class="form-select" required>
                                {% for method in methods %}<option value="{{ method }}" {% if rental.payment and rental.payment.method == method %}selected{% endif %}>{{ method|title }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Simulation Status</label>
                            <select name="status" class="form-select" required>
                                {% for status in statuses %}<option value="{{ status }}" {% if rental.payment and rental.payment.status == status %}selected{% endif %}>{{ status|title }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-12"><button class="btn btn-primary">Save Payment</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
